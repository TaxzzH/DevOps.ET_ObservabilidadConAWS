name: "Pipeline CI/CD - Observabilidad, Seguridad y Despliegue"

on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:

  # --------- SNYK ---------
  analisis-vulnerabilidad:
    name: "Snyk Security Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk Test (Seguridad)
        env: 
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --severity-threshold=high

  # --------- SONARCLOUD ---------
  analisis-sonarcloud:
    name: "SonarCloud & Quality Gate"
    runs-on: ubuntu-latest
    needs: analisis-vulnerabilidad # Espera a Snyk
    steps: 
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      
      - name: SonarCloud Scan y Quality Gate
        env: 
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PROJECT_KEY_SONAR: ${{ secrets.PROJECT_KEY_SONAR }}
          ORGANIZATION_SONAR: ${{ secrets.ORGANIZATION_SONAR }}
        # sonar.qualitygate.wait=true bloquea el pipeline si el código es malo (IE6)
        run: |
          mvn verify sonar:sonar \
           -Dsonar.host.url=https://sonarcloud.io \
           -Dsonar.projectKey=${PROJECT_KEY_SONAR} \
           -Dsonar.organization=${ORGANIZATION_SONAR} \
           -Dsonar.login=${SONAR_TOKEN} \
           -Dsonar.qualitygate.wait=true

  build-and-push:
    name: "Build Docker Image & Push"
    runs-on: ubuntu-latest
    needs: [analisis-vulnerabilidad, analisis-sonarcloud] 
    
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          
      - name: "Extract Metadata"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/suscripciones-api
          tags: |
            type=raw,value=latest
            type=sha,value={{sha}}

      - name: "Build and Push Image"
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: "Finalización Exitosa"
        run: echo "🚀 Imagen subida a Docker Hub de forma segura tras pasar todas las pruebas."   