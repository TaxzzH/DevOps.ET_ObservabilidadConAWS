name: "Pipeline CI/CD - Observabilidad, Seguridad y Despliegue"

on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:

  # --------- SNYK ---------
  analisis-vulnerabilidad :
    runs-on: ubuntu-latest
    # needs: test 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' # Asegúrate que coincida con tu proyecto
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw
        continue-on-error: true # Por si no usas wrapper

      - name: snyk test java 
        continue-on-error: true
        env: 
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          JAVA_OPTS: "-Xmx2g"
          MAVEN_OPTS: "-Xmx2g"
        run: snyk test --severity-threshold=high

      - name : generate snyk JSON Report 
        continue-on-error: true
        if: always()
        run: |
          echo "Generando reporte "
          snyk test --json > snyk-report.json || echo "fallo "
          ls -lh snyk-report.json || echo "no se genero el reporte"
      
      - name: upload snyk json report 
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: snyk-report.json
    
  
