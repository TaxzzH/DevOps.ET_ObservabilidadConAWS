spring.application.name=subcripciones
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.port=8080

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# =====================================================
# Actuator: exponer el endpoint de métricas Prometheus
# =====================================================
management.endpoints.web.exposure.include=prometheus,health,info
# Ruta base del actuator (por defecto: /actuator)
management.endpoints.web.base-path=/actuator
# Añadir etiquetas comunes a todas las métricas
management.metrics.tags.application=${spring.application.name}